spring.application.name=real-time-order-processing

# Comma-separated browser origins allowed to call this API (Vite default: 5173).
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000

# Optional gitignored overrides (copy from application-local.properties).
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:postgresql://localhost:5432/real_time_order_processing
spring.datasource.username=postgres
# Use SPRING_DATASOURCE_PASSWORD env, DB_PASSWORD fallback, or application-local.properties
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

# Razorpay (RAZORPAY_KEY / RAZORPAY_KEY_SECRET env, or application-local.properties)
razorpay.key=${RAZORPAY_KEY:}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:}
