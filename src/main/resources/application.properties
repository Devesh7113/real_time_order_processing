spring.application.name=real-time-order-processing

# Comma-separated browser origins allowed to call this API (Vite default: 5173).
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000

# Optional gitignored overrides (copy from application-local.properties).
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/real_time_order_processing}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
# Use SPRING_DATASOURCE_PASSWORD env, DB_PASSWORD fallback, or application-local.properties.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

# Razorpay (RAZORPAY_KEY / RAZORPAY_KEY_SECRET env, or application-local.properties)
razorpay.key=${RAZORPAY_KEY:}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:}

# HS256 key as Base64. Set JWT_SECRET on Render (e.g. openssl rand -base64 64).
app.jwt.secret=${JWT_SECRET:j4F7xP9qLmB2zT8wR6sQ1vN0yH5kC3uD7eX9pL4rA2wS8mF6tH9bG3cZ1vE5}

spring.ai.vectorstore.pgvector.initialize-schema=true

# Chat history (JdbcChatMemoryRepository) — same Postgres DB as the app
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

# MCP client → inventory helpdesk tools (SSE)
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.type=SYNC
spring.ai.mcp.client.sse.connections.inventory.url=${APP_INVENTORY_BASE_URL:http://localhost:9090}

# OpenAI (OPENAI_API_KEY / OPENAI_CHAT_MODEL env, or application-local.properties)
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL:gpt-4o-mini}